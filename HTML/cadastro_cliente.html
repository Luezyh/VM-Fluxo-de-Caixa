<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/cadastrar_cliente.css">
    <title>Cadastro do cliente</title>
</head>
<body>

    <a href="../index.html" class="back"><img src="../IMAGES/voltar.png" alt=""></a>

    <form action="adicionar_produtos.html" method="get" class="forms">

        <h3>Informações do cliente</h3>

        <div class="input-box">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Nome completo" required>
        </div>
        
        <div class="input-box">
            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required>
        </div>

        <div class="input-box">
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" maxlength="15" required>
        </div>

        <button type="submit">Cadastrar</button>
    </form>

    <script src="../JAVASCRIPT/cadastrar_cliente.js"></script>
    
</body>
</html>
