<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/adicionar_produto.css">
    <title>Adicionar produtos</title>
</head>
<body>

    <div class="base">
        <div class="payment">
            <button class="close" onclick="Fechar_Pagamento()"><img src="../IMAGES/fechar.png"></button>

            <h2>Selecione a forma de pagamento</h2>

            <div class="cards">
               <div class="card">
                    <img src="">
                    <p>Crédito</p>
                </div>

                <div class="card">
                    <img src="">
                    <p>Pix</p>
                </div>

                <div class="card">
                    <img src="">
                    <p>Débito</p>
                </div> 
            </div>

            <button onclick="Finalizar_Compra()" class="confirm">Confirmar</button>
            
        </div>
    </div>

    <a href="../index.html" class="back"><img src="../IMAGES/voltar.png" alt=""></a>

    <div class="main">
        <div class="produtos">
            <h3>Produtos disponíveis</h3>
            <div class="produtos-lista">
                <div class="produto">
                    <img src="../IMAGES/1.png">
                    <p>Arroz Camil</p>
                    <p>15,00R$</p>
                    <button onclick="Add('Arroz Camil', '15,00R$', '../IMAGES/1.png')" class="add">+</button>
                </div>
                <div class="produto">
                    <img src="../IMAGES/2.png">
                    <p>Feijão Kicaldo</p>
                    <p>8,00R$</p>
                    <button onclick="Add('Feijão Kicaldo', '8,00R$', '../IMAGES/2.png')" class="add">+</button>
                </div>
                <div class="produto">
                    <img src="../IMAGES/3.png" alt="">
                    <p>Sucrilhos Brawl Stars</p>
                    <p>18,00R$</p>
                    <button onclick="Add('Sucrilhos Brawl Stars', '18,00R$', '../IMAGES/3.png')" class="add">+</button>
                </div>
                <div class="produto">
                    <img src="../IMAGES/4.png">
                    <p>Nescau 990g</p>
                    <p>20,00R$</p>
                    <button onclick="Add('Nescau 990g', '20,00R$', '../IMAGES/4.png')" class="add">+</button>
                </div>
                <div class="produto">
                    <img src="../IMAGES/5.png">
                    <p>Leite Tirol</p>
                    <p>5,00R$</p>
                    <button onclick="Add('Leite Tirol', '5,00R$', '../IMAGES/5.png')" class="add">+</button>
                </div>
            </div>
        </div>

        <div class="carrinho">
            <h3>Carrinho de compras</h3>
            <div class="carrinho-lista">
            </div>
            <div class="options">
                <button onclick="Selecionar_Pagamento()">Finalizar compra</button>
                <button onclick="Limpar_Carrinho()">Limpar carrinho</button>
            </div>
        </div>
    </div>

    <script src="../JAVASCRIPT/adicionar_produtos.js"></script>
    
</body>
</html>
