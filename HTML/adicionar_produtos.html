<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/adicionar_produto.css">
    <title>Adicionar produtos</title>
</head>
<body>

    <div class="produtos">
        <h3>Produtos disponíveis</h3>
        <div class="produtos-lista">
            <div class="produto">
                <img src="" alt="">
                <p>Nome do produto</p>
                <p>Preço un.</p>
                <button>+</button>
            </div>
            <div class="produto">
                <img src="" alt="">
                <p>Nome do produto</p>
                <p>Preço un.</p>
                <button>+</button>
            </div>
            <div class="produto">
                <img src="" alt="">
                <p>Nome do produto</p>
                <p>Preço un.</p>
                <button>+</button>
            </div>
            <div class="produto">
                <img src="" alt="">
                <p>Nome do produto</p>
                <p>Preço un.</p>
                <button>+</button>
            </div>
        </div>
    </div>

    <div class="carrinho">
        <h3>Carrinho de compras</h3>
        <div class="carrinho-lista">
            <div class="produto">
                <img src="" alt="">
                <p>Nome do produto</p>
                <p>Preço un.</p>
                <button>+</button>
                <input type="number" value="1" min="1">
                <button>-</button>
            </div>
            <div class="produto">
                <img src="" alt="">
                <p>Nome do produto</p>
                <p>Preço un.</p>
                <button>+</button>
            </div>
            <div class="produto">
                <img src="" alt="">
                <p>Nome do produto</p>
                <p>Preço un.</p>
                <button>+</button>
            </div>
        </div>
        <div class="options">
            <button>Finalizar compra</button>
            <button>Limpar carrinho</button>
        </div>
    </div>
    
</body>
</html>
