<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota fiscal</title>
    <link rel="stylesheet" href="../CSS/nota.css">
</head>
<body>

    <div class="nota">
        <div class="dados">
            <p>Nome do cliente:</p>
            <p>CPF:</p>
            <p>Contato:</p>
        </div>
        <table class="produtos">
            <tr>
                <th>Produto</th>
                <th>Preço</th>
                <th>Quantidade</th>
            </tr>
            <tr>
                <td>Produto 1</td>
                <td>R$ 10,00</td>
                <td><input type="number" name="quantidade_produto_1" min="0"></td>
            </tr>
            <tr>
                <td>Produto 2</td>
                <td>R$ 20,00</td>
                <td><input type="number" name="quantidade_produto_2" min="0"></td>
            </tr>
        </table>
        <div>
            <h1>Total:</h1>
        </div>
    </div>
    
</body>
</html>
